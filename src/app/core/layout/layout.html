<div id="app">
  <aside id="sidebar" [class.collapsed]="sidebarCollapsed()">
    <div class="sb-header">
      @if(sidebarCollapsed()) {
        <div style="margin: 0 auto; display:flex; align-items:center; justify-content:center;">
          <img src="logo-xplora-cuadrado.png" alt="Xplora Icon" width="28" height="28" style="object-fit: contain;">
        </div>
      } @else {
        <div id="sb-brand" style="flex:1; display:flex; align-items:center;">
          <img src="logo-xplora-cn-nombre.png" alt="Xplora" height="24" style="object-fit: contain;">
        </div>
      }
      <button class="sb-toggle" (click)="toggleSidebar()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
    <nav class="sb-nav" id="sb-nav">
      @for(item of visibleNavItems(); track item.id) {
        <a [routerLink]="'/' + item.id" routerLinkActive="active" class="nav-btn" style="text-decoration:none">
          <span [innerHTML]="item.icon"></span>
          <span class="nav-label">{{item.label}}</span>
        </a>
      }
    </nav>
    <div class="sb-footer">
      @if(auth.currentUser(); as user) {
        @if(!sidebarCollapsed()) {
          <a routerLink="/perfil" class="sb-user" id="sb-user-info" style="text-decoration:none; cursor:pointer">
            <div class="sb-user-name" style="color:var(--text-main)">{{user.name}}</div>
            <div class="sb-user-role" style="color:var(--text-muted)">{{ROLE_LABELS[user.role]}}</div>
          </a>
        }
        <button class="sb-logout" (click)="doLogout()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          @if(!sidebarCollapsed()) {
            <span id="sb-logout-label">Cerrar sesión</span>
          }
        </button>
      }
    </div>
  </aside>
  <div id="main">
    <header id="topbar">
      <!-- The title can be static or dynamic, for simplicity, leave empty or static as we use router -->
      <h1 id="page-title" style="font-size:16px;font-weight:700;color:var(--text-main); margin:0;">Xplora</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-ghost btn-sm" (click)="cycleTheme()" title="Cambiar tema" style="display:flex; align-items:center; justify-content:center; padding:6px; border-radius:50%; margin-right:8px">
          @if(themeService.currentTheme() === 'light') {
            <svg width="18" height="18" fill="none" stroke="var(--warning)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          } @else {
            <svg width="18" height="18" fill="none" stroke="var(--primary)" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          }
        </button>
        <div style="position:relative"><svg width="18" height="18" fill="none" stroke="var(--text-muted)" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--white)"></span></div>
        @if(auth.currentUser(); as user) {
          <a routerLink="/perfil" id="topbar-avatar" [style.background]="ROLE_COLORS[user.role]+'22'" [style.color]="ROLE_COLORS[user.role]" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none">
            {{avatarInitials(user.name)}}
          </a>
        }
      </div>
    </header>
    <div id="content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
